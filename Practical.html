<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Student Login Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600&display=swap" rel="stylesheet">
  <style>
    :root {
      --green-dark: #2E7D32;
      --green-mid: #43A047;
      --green-light: #96e6a1;
      --green-pale: #d4fc79;
      --text-dark: #1a2e1b;
      --text-mid: #4a6b4c;
      --text-light: #7a9e7c;
      --border: rgba(46, 125, 50, 0.15);
      --shadow: 0 32px 80px rgba(46, 125, 50, 0.18), 0 8px 24px rgba(0,0,0,0.08);
      --radius: 24px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #d4fc79 0%, #96e6a1 50%, #69d98c 100%);
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      top: -120px; right: -120px;
      width: 400px; height: 400px;
      background: radial-gradient(circle, rgba(255,255,255,0.35) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    body::after {
      content: '';
      position: fixed;
      bottom: -100px; left: -100px;
      width: 350px; height: 350px;
      background: radial-gradient(circle, rgba(46,125,50,0.12) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }
    .leaf { position: fixed; opacity: 0.12; pointer-events: none; }
    .leaf-1 { top: 8%; left: 5%; transform: rotate(-20deg); font-size: 56px; }
    .leaf-2 { top: 20%; right: 8%; transform: rotate(30deg); font-size: 40px; }
    .leaf-3 { bottom: 15%; left: 8%; transform: rotate(15deg); font-size: 44px; }
    .leaf-4 { bottom: 25%; right: 5%; transform: rotate(-35deg); font-size: 36px; }
    .card {
      position: relative;
      background: rgba(255,255,255,0.72);
      backdrop-filter: blur(28px);
      -webkit-backdrop-filter: blur(28px);
      border: 1px solid rgba(255,255,255,0.85);
      border-radius: var(--radius);
      padding: 52px 44px 44px;
      width: 420px;
      max-width: calc(100vw - 32px);
      box-shadow: var(--shadow);
      animation: riseUp 0.7s cubic-bezier(0.22,1,0.36,1) forwards;
      opacity: 0;
    }
    @keyframes riseUp {
      from { opacity: 0; transform: translateY(36px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    .card-accent {
      position: absolute;
      top: 0; left: 44px; right: 44px;
      height: 3px;
      background: linear-gradient(90deg, var(--green-pale), var(--green-dark), var(--green-light));
      border-radius: 0 0 4px 4px;
    }
    .top-section { text-align: center; }
    .portal-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: linear-gradient(135deg, #e8f5e9, #c8e6c9);
      border: 1px solid rgba(46,125,50,0.2);
      border-radius: 100px;
      padding: 5px 14px;
      font-size: 15px;
      font-weight: 600;
      color: var(--green-dark);
      letter-spacing: 0.8px;
      text-transform: uppercase;
      margin-bottom: 20px;
    }
    .avatar-ring {
      width: 56px; height: 56px;
      background: linear-gradient(135deg, var(--green-pale), var(--green-light));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin: 0 auto 18px;
      box-shadow: 0 4px 16px rgba(46,125,50,0.2);
    }
    .card-header { margin-bottom: 32px; text-align: center; }
    .card-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      color: var(--text-dark);
      line-height: 1.2;
      margin-bottom: 6px;
    }
    .card-header p { font-size: 14px; color: var(--text-light); }
    .field { margin-bottom: 18px; }
    .field label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-mid);
      letter-spacing: 0.6px;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap .ico {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.45;
      pointer-events: none;
      transition: opacity 0.2s;
    }
    .input-wrap input {
      width: 100%;
      padding: 13px 16px 13px 44px;
      background: rgba(255,255,255,0.8);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text-dark);
      outline: none;
      transition: border-color 0.25s, background 0.25s, box-shadow 0.25s;
    }
    .input-wrap input::placeholder { color: #b0c4b1; }
    .input-wrap input:focus {
      border-color: var(--green-mid);
      background: #fff;
      box-shadow: 0 0 0 4px rgba(46,125,50,0.08);
    }
    .input-wrap input:focus ~ .ico { opacity: 0.85; }
    .btn-login {
      width: 100%;
      padding: 15px;
      margin-top: 10px;
      background: linear-gradient(135deg, #2E7D32, #388E3C);
      color: #fff;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.4px;
      position: relative;
      overflow: hidden;
      transition: transform 0.15s, box-shadow 0.25s, opacity 0.2s;
      box-shadow: 0 6px 24px rgba(46,125,50,0.35);
    }
    .btn-login::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1), transparent);
    }
    .btn-login:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(46,125,50,0.42);
    }
    .btn-login:active:not(:disabled) { transform: translateY(0); }
    .btn-login:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; }
    #message {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      text-align: center;
      display: none;
      animation: popIn 0.3s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.95); }
      to   { opacity: 1; transform: scale(1); }
    }
    #message.success { display: block; background: #e8f5e9; border: 1px solid #a5d6a7; color: #2E7D32; }
    #message.error   { display: block; background: #ffebee; border: 1px solid #ffcdd2; color: #c62828; }
    #message.locked  { display: block; background: #fff8e1; border: 1px solid #ffe082; color: #e65100; }
    .dots-row { display: flex; align-items: center; justify-content: center; gap: 8px; margin-top: 18px; }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #cde8ce;
      border: 1.5px solid #aed9af;
      transition: background 0.3s, transform 0.2s;
    }
    .dot.used { background: #ef9a9a; border-color: #e57373; transform: scale(1.2); }
    .card-footer {
      margin-top: 28px;
      padding-top: 20px;
      border-top: 1px solid rgba(46,125,50,0.1);
      text-align: center;
      font-size: 12px;
      color: var(--text-light);
    }
    .card-footer strong { color: var(--green-dark); }
  </style>
</head>
<body>
  <div class="leaf leaf-1">🌿</div>
  <div class="leaf leaf-2">🍃</div>
  <div class="leaf leaf-3">🌱</div>
  <div class="leaf leaf-4">🍀</div>

  <div class="card">
    <div class="card-accent"></div>
  <div class="top-section">
    <div class="avatar-ring">🎓</div>
    <div class="portal-badge">Student Portal</div>
  </div>
    <div class="card-header">
      <h1>Welcome Back</h1>
      <p>Login to access your student account</p>
    </div>

    <div class="field">
      <label>Username</label>
      <div class="input-wrap">
        <input type="text" id="username" placeholder="Enter your username" autocomplete="username">
        <span class="ico">👤</span>
      </div>
    </div>

    <div class="field">
      <label>Password</label>
      <div class="input-wrap">
        <input type="password" id="password" placeholder="Enter your password" autocomplete="current-password">
        <span class="ico">🔒</span>
      </div>
    </div>

    <button class="btn-login" id="loginBtn" onclick="login()">Login</button>
    <p id="message"></p>
    <div class="dots-row" id="dotsBar">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>


  </div>

  <script>
    var users = [
      { username: "Cristel Marie",   password: "2003" },
      { username: "admin",   password: "1234" },
      { username: "student1",  password: "1111" },
      { username: "student2",  password: "2222" }
    ];
    var maxAttempts = 3, attempts = 0, locked = false;

    function login() {
      if (locked) return;
      var user = document.getElementById("username").value.trim();
      var pass = document.getElementById("password").value.trim();
      var found = users.find(function(u) { return u.username === user && u.password === pass; });
      if (found) {
        showMessage("✅  Welcome, " + user + "!", "success");
        ["loginBtn","username","password"].forEach(function(id){ document.getElementById(id).disabled = true; });
      } else {
        attempts++;
        var dot = document.getElementById("d" + attempts);
        if (dot) dot.classList.add("used");
        if (attempts >= maxAttempts) {
          locked = true;
          showMessage("🔒  Account locked. Too many failed attempts.", "locked");
          ["loginBtn","username","password"].forEach(function(id){ document.getElementById(id).disabled = true; });
        } else {
          var left = maxAttempts - attempts;
          showMessage("❌  Invalid credentials. " + left + " attempt" + (left > 1 ? "s" : "") + " remaining.", "error");
        }
      }
    }
    function showMessage(text, type) {
      var el = document.getElementById("message");
      el.className = type; el.innerHTML = text;
    }
    document.addEventListener("keydown", function(e) { if (e.key === "Enter") login(); });
  </script>
</body>
</html>
