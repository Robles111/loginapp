<!DOCTYPE html>
<html>
<head>
  <title>Login System</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Poppins', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
      overflow: hidden;
    }

    .bg-circle {
      position: fixed;
      border-radius: 50%;
      opacity: 0.08;
      animation: float 8s ease-in-out infinite;
    }
    .bg-circle:nth-child(1) { width: 300px; height: 300px; background: #a78bfa; top: -80px; left: -80px; animation-delay: 0s; }
    .bg-circle:nth-child(2) { width: 200px; height: 200px; background: #60a5fa; bottom: -60px; right: -60px; animation-delay: 3s; }
    .bg-circle:nth-child(3) { width: 150px; height: 150px; background: #f472b6; top: 50%; left: 10%; animation-delay: 5s; }

    @keyframes float {
      0%, 100% { transform: translateY(0px) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
    }

    .login-card {
      position: relative;
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 24px;
      padding: 48px 40px 40px;
      width: 360px;
      box-shadow: 0 25px 60px rgba(0,0,0,0.4);
      animation: slideUp 0.6s ease forwards;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon-wrap {
      width: 64px; height: 64px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 28px;
      box-shadow: 0 8px 24px rgba(167,139,250,0.4);
    }

    h2 {
      color: #fff;
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 4px;
    }

    .subtitle {
      color: rgba(255,255,255,0.45);
      font-size: 13px;
      text-align: center;
      margin-bottom: 32px;
    }

    .input-group {
      position: relative;
      margin-bottom: 16px;
    }

    .input-group label {
      display: block;
      color: rgba(255,255,255,0.6);
      font-size: 12px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      margin-bottom: 8px;
    }

    .input-group .icon {
      position: absolute;
      bottom: 13px;
      left: 14px;
      font-size: 16px;
      opacity: 0.5;
    }

    .input-group input {
      width: 100%;
      padding: 13px 14px 13px 40px;
      background: rgba(255,255,255,0.07);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 14px;
      outline: none;
      transition: border 0.2s, background 0.2s;
    }

    .input-group input::placeholder { color: rgba(255,255,255,0.25); }

    .input-group input:focus {
      border-color: #a78bfa;
      background: rgba(167,139,250,0.1);
    }

    button {
      width: 100%;
      padding: 14px;
      margin-top: 10px;
      background: linear-gradient(135deg, #a78bfa, #60a5fa);
      color: #fff;
      font-family: 'Poppins', sans-serif;
      font-size: 15px;
      font-weight: 600;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: opacity 0.2s, transform 0.1s;
      box-shadow: 0 6px 20px rgba(167,139,250,0.35);
    }

    button:hover { opacity: 0.9; transform: translateY(-1px); }
    button:active { transform: translateY(0); }
    button:disabled { opacity: 0.45; cursor: not-allowed; transform: none; }

    #message {
      margin-top: 18px;
      padding: 12px 16px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 600;
      text-align: center;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn { from { opacity: 0; transform: scale(0.97); } to { opacity: 1; transform: scale(1); } }

    #message.success {
      display: block;
      background: rgba(52, 211, 153, 0.15);
      border: 1px solid rgba(52,211,153,0.3);
      color: #34d399;
    }

    #message.error {
      display: block;
      background: rgba(248, 113, 113, 0.15);
      border: 1px solid rgba(248,113,113,0.3);
      color: #f87171;
    }

    #message.locked {
      display: block;
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid rgba(251,191,36,0.3);
      color: #fbbf24;
    }

    .attempts-bar {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-top: 14px;
    }

    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      transition: background 0.3s;
    }

    .dot.used { background: #f87171; }
  </style>
</head>
<body>

  <div class="bg-circle"></div>
  <div class="bg-circle"></div>
  <div class="bg-circle"></div>

  <div class="login-card">
    <div class="icon-wrap">🔐</div>
    <h2>Welcome Back</h2>
    <p class="subtitle">Student Login Portal</p>

    <div class="input-group">
      <label>Username</label>
      <span class="icon">👤</span>
      <input type="text" id="username" placeholder="Enter your username">
    </div>

    <div class="input-group">
      <label>Password</label>
      <span class="icon">🔑</span>
      <input type="password" id="password" placeholder="Enter your password">
    </div>

    <button onclick="login()" id="loginBtn">Login</button>

    <p id="message"></p>

    <div class="attempts-bar" id="dotsBar">
      <div class="dot" id="d1"></div>
      <div class="dot" id="d2"></div>
      <div class="dot" id="d3"></div>
    </div>
  </div>

  <script>
    // TASK 2: 3 users | TASK 1: change "juan"/"2003" to YOUR first name & birth year
    var users = [
      { username: "juan",     password: "2003" },
      { username: "student1", password: "1111" },
      { username: "student2", password: "2222" }
    ];

    var maxAttempts = 3;
    var attempts = 0;
    var locked = false;

    function login() {
      if (locked) return;

      var user = document.getElementById("username").value.trim();
      var pass = document.getElementById("password").value.trim();

      var found = users.find(function(u) {
        return u.username === user && u.password === pass;
      });

      if (found) {
        showMessage("✅  Welcome, " + user + "!", "success");
        document.getElementById("loginBtn").disabled = true;
        document.getElementById("username").disabled = true;
        document.getElementById("password").disabled = true;
      } else {
        attempts++;
        var dot = document.getElementById("d" + attempts);
        if (dot) dot.classList.add("used");

        if (attempts >= maxAttempts) {
          locked = true;
          showMessage("🔒  Account Locked! Too many failed attempts.", "locked");
          document.getElementById("loginBtn").disabled = true;
          document.getElementById("username").disabled = true;
          document.getElementById("password").disabled = true;
        } else {
          var left = maxAttempts - attempts;
          showMessage("❌  Invalid credentials. " + left + " attempt" + (left > 1 ? "s" : "") + " left.", "error");
        }
      }
    }

    function showMessage(text, type) {
      var el = document.getElementById("message");
      el.className = type;
      el.innerHTML = text;
    }

    document.addEventListener("keydown", function(e) {
      if (e.key === "Enter") login();
    });
  </script>

</body>
</html>
